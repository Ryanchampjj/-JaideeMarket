<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#DC2626">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="JAIDEE">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="application-name" content="JAIDEE Market">
  <meta name="description" content="ระบบจองล็อคขายของ JAIDEE Market">

  <title>JAIDEE Market — จองล็อคขายของ</title>

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" sizes="180x180" href="icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icon.png">

  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: 'Sarabun', -apple-system, sans-serif;
      background: linear-gradient(135deg, #DC2626 0%, #991B1B 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
      padding-top: max(24px, env(safe-area-inset-top));
      padding-bottom: max(24px, env(safe-area-inset-bottom));
    }
    .container {
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    .logo {
      width: 132px;
      height: 132px;
      margin: 0 auto 20px;
      border-radius: 28px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.25);
      background: white;
      padding: 8px;
      display: block;
    }
    h1 {
      color: white;
      font-size: 38px;
      font-weight: 800;
      margin: 0 0 4px;
      letter-spacing: 3px;
      line-height: 1;
    }
    .tagline {
      color: rgba(255,255,255,0.95);
      font-size: 14px;
      letter-spacing: 4px;
      font-weight: 700;
      margin-bottom: 28px;
    }
    .tagline::before, .tagline::after {
      content: '—';
      margin: 0 10px;
      opacity: .7;
    }
    .info-card {
      background: white;
      border-radius: 16px;
      padding: 18px 20px;
      margin-bottom: 18px;
      text-align: left;
      box-shadow: 0 8px 20px rgba(0,0,0,0.12);
    }
    .info-card h2 {
      color: #DC2626;
      font-size: 16px;
      font-weight: 700;
      margin: 0 0 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .info-card p {
      color: #4B5563;
      font-size: 13px;
      line-height: 1.5;
      margin: 0 0 12px;
    }
    .market-days {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .day-pill {
      background: #FEE2E2;
      color: #991B1B;
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      font-size: 17px;
      font-weight: 700;
      text-decoration: none;
      text-align: center;
      margin-bottom: 10px;
      transition: transform .1s;
      border: none;
      cursor: pointer;
      font-family: inherit;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary {
      background: white;
      color: #DC2626;
      box-shadow: 0 8px 20px rgba(0,0,0,0.18);
    }
    .btn-secondary {
      background: rgba(255,255,255,0.18);
      color: white;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.25);
    }
    .footer {
      color: rgba(255,255,255,0.85);
      font-size: 12px;
      margin-top: 22px;
      line-height: 1.6;
    }
    .install-hint {
      background: rgba(255,255,255,0.12);
      border: 1px dashed rgba(255,255,255,0.4);
      color: white;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 12px;
      margin-top: 18px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="icon.png" alt="JAIDEE Market" class="logo">

    <h1>JAIDEE</h1>
    <div class="tagline">MARKET</div>

    <div class="info-card">
      <h2>🛒 ระบบจองล็อคขายของ</h2>
      <p>เลือกล็อคที่ต้องการได้เอง จองครั้งเดียวใช้ได้ทุกวันตลาดในรอบนั้น</p>
      <div class="market-days">
        <span class="day-pill">อังคาร</span>
        <span class="day-pill">พฤหัส</span>
        <span class="day-pill">อาทิตย์</span>
      </div>
    </div>

    <a href="https://script.google.com/macros/s/AKfycbygsfi9BosYSUgG_Oah2rNK01o1dNBZRybYhVPa0iONM64r8PFDtfdd6FnN94NJPmu8/exec"
       class="btn btn-primary">
      🛒 เริ่มจองเลย
    </a>

    <a href="https://line.me/ti/p/~papajearming" class="btn btn-secondary">
      💬 ติดต่อแอดมิน (เฮียแชมป์)
    </a>

    <div class="install-hint">
      💡 <strong>กดบันทึกหน้านี้ลงหน้าจอหลัก</strong><br>
      เพื่อใช้งานง่ายเหมือนแอป — เปิดได้ทันทีไม่ต้องค้นลิงก์
    </div>

    <div class="footer">
      © JAIDEE Market<br>
      ตลาดนัดเฮียแชมป์
    </div>
  </div>
</body>
</html>
